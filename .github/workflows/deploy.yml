name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
          
      - name: Install Hugging Face CLI
        run: pip install huggingface_hub
        
      - name: Push to Hugging Face via CLI
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Git Push වෙනුවට HF CLI භාවිතා කිරීමෙන් LFS errors මඟහැරේ
          huggingface-cli upload bhanura/lepinet-backend . / --repo-type=space --token=$HF_TOKEN