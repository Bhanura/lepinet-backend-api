name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
          
      # Python සකස් කිරීම (මෙය එකතු කළා)
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      # CLI එක නිවැරදිව Install කිරීම
      - name: Install Hugging Face CLI
        run: pip install -U "huggingface_hub[cli]"
        
      # Model එක සහ කේතය Upload කිරීම
      - name: Push to Hugging Face via CLI
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          huggingface-cli upload bhanura/lepinet-backend . . --repo-type=space --token=$HF_TOKEN